<html>
    <head>
        <title>Login Page</title>
        <style>
            body{
                margin: 0;
                font-family: 'Times New Roman', Times, serif;
                background: linear-gradient(to right, #4cfc4c, #00f2fe);
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .login-container{
                background: whitesmoke;
                padding: 30px;
                width: 300px;
                border-radius: 10px;
                box-shadow: 10px;
                text-align: 0 8px 20px rgba(0,0,0,0.2);
            }
            label{
                font-weight: bold;
            }
            button{
                width: 100%;
                padding: 10px;
                background: cyan;
                color: whitesmoke;
                font-size: 16px;
                border-radius: 5px;
                cursor: pointer;
                transition: 0.3s;
            }
            button:hover{
                background: #007bff;
            }
            .footer{
                margin-top: 15px;
                font-size: 13px;
            }

        </style>
        <script>
            function validateLogin(event)
            {
                event.preventDefault();
                const username = document.getElementById("username").value;
                const password = document.getElementById("password").value;
                const error = document.getElementById("error-msg");
                const success = document.getElementById("success-msg");

                error.textContent = "";
                success.textContent = "";

                if(username === "" || password === "")
            {
                error.textContent = "fields cannot be empty";
                return false;
            }
            if(password.length < 8 || password.length > 12)
            {
                error.textContent = "Length of password should be between 8 and 12 characters";
                return false;
            }
            if(username === "iet" && password === "iet12345")
            {
                success.textContent = "Login Successful";
                window.location.href = "form.html";
            }
            else
            {
                error.textContent = "Invalid Credentials";
            }
            }
        </script>
    </head>
    <body>
        <div class="login-container">
            <h1>Login</h1>
            <form onsubmit="return validateLogin(event)">
                <div id="error-msg" style="color: red;"></div>
                <div id="success-msg" style="color: greenyellow;"></div>

                <div class="form-group">
                    <label>Username:</label>
                    <input type="text" id="username" name="username" required><br><br>
                </div>

                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" id="password" name="password" required><br><br>
                </div>
                <button type="submit">Sign In</button>
            </form>
            <div class="footer">
                <p>Forgot Password? <a href="#">Click here</a></p>
            </div>
            </div>
    </body>
</html>
