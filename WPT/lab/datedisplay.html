<html>
    <head>
        <title>Date</title>
    </head>
    <body>
        <h2>Date Display</h2>
        
        <label for="dateInput">Display Date:</label>
        <input type="date" id="dateInput"><br><br>

        <button onclick="selectedDate()">Show Selected Date</button>
        <button onclick="todayDate()">Show Today Date</button>
        <button onclick="changeDate()">Show Changed Date</button>

        
        
        <p id="result"></p>

        <script>
            function todayDate()
            {
                let d = new Date();
                document.getElementById("result").innerHTML = d;
            }
            function changeDate()
            {
                let d = new Date();
                let changed = d.getDate() + "/" + (d.getMonth()+1) + "/" + d.getFullYear();
                document.getElementById("result").innerHTML = changed;
            }
            function selectedDate()
            {
                let userDate = document.getElementById("dateInput").value;
                if(userDate == "")
                    document.getElementById("result").innerHTML = "Please select a date";
                else
                    document.getElementById("result").innerHTML = userDate;
            }
        </script>
    </body>
</html>
