<!DOCTYPE html>
<html>
    <head>
        <title>jQuery Example</title>
        <script src="https://code.jquery.com/jquery-3.7.1.min.js++
        "></script>
    </head>
    <body>
        <h2 id="text">Hello CDAC</h2>
        <button id="btn">Click Me</button>

        <script>
            $(document).ready(function(){
                $("#btn").click(function(){
                    $("#text").slideToggle("fast");
                });
            });
        </script>
    </body>
</html>
