<!DOCTYPE html>
<html>
    <head>
        <title>Date Time</title>
    </head>
    <body>
        <h1>Show current date and time on webpage using JavaScript</h1>

        <button onclick="fullDate()">Show Full Date</button>
        <button onclick="onlyTime()">Show Only Time</button>

        <p id="res"></p>

        <script>
            function fullDate()
            {
                let d = new Date();
                document.getElementById("res").innerHTML = d.toDateString();
            }
            function onlyTime()
            {
                let d = new Date();
                document.getElementById("res").innerHTML = d.toLocaleTimeString();
            }
        </script>
    </body>
</html>
