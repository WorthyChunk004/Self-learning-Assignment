<!DOCTYPE html>
<html>
    <head>
        <title>Currency Converter</title>
        <style>
            fieldset{
                border: 2px solid black;
                width: 300px;
                padding: 15px;
            }
            p{
                background-color: lightcyan;
                color: blue;
                border: 2px solid red;
                padding: 10px;
                font-weight: bold;
            }
        </style>
        <script>
            function convert()
            {
                var amt = document.getElementById("amt").value;
                var from = document.getElementById("from").value;
                var to = document.getElementById("to").value;

                var result;

                if(from == "rupee" && to == "dollar")
                result = amt/80;
                
                else if(from == "dollar" && to == "rupee")
                result = amt*80;

                else if(from == "rupee" && to == "euro")
                result = amt/90;

                else if(from == "euro" && to == "rupee")
                result = amt*90;

                else
                    result = amt;

                    document.getElementById("res").innerHTML = "Converted Amount = "+ result;
            }
        </script>
    </head>
    <body>
        <fieldset>
            <label>Amount:</label>
            <input type="text" id="amt"><br><br>

            <label>From:</label>
            <select id="from">
                <option value="rupee">Rupee</option>
                <option value="dollar">Dollar</option>
                <option value="euro">Euro</option>
            </select>
            <br><br>

            <label>To:</label>
            <select name="to" id="to">
            <option value="rupee">Rupee</option>
            <option value="dollar">Dollar</option>
            <option value="euro">Euro</option>
            </select>

            <br><br>

            <button onclick="convert()">Convert</button>
        </fieldset>
        <br>
        <p id="res">Converted amount will appear here</p>
    </body>
</html>
