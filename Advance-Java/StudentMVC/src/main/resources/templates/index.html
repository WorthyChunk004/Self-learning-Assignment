<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student List</title>
</head>
<body>
<h2>Student Management</h2>

<a href="/add">Add Student</a>
<br><br>

<table border="1">
<tr>
	<th>ID</th>
	<th>Name</th>
	<th>Course</th>
	<th>Marks</th>
	<th>Action</th>
</tr>
<tr th:each="s : ${students}">
<td th:text="${s.id}"></td>
<td th:text="${s.name}"></td>
<td th:text="${s.course}"></td>
<td th:text="${s.marks}"></td>

<td>
<a th:href="@{/delete/{id}(id=${s.id})}">Delete</a>
</td>
</tr>
</table>
</body>
</html>
