<!DOCTYPE html>
<html>
    <head>
        <title>Media</title>
    </head>
    <body>
        <h2>Youtube video using iframe</h2>

        <iframe width="560" height="300" src="https://www.youtube.com/embed/gMTqWZoPAC8?si=TPf_wg_CUSaOfluS" title="YouTube video player" frameborder="4" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        <br><br>

        <h2>HTML5 Video Controls</h2>

        <video width="400" controls>
            <source src="samplevideo.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <br><br>

        <h2>HTML5 Audio Controls</h2>
        <audio controls>
        <source src="sampleaudio.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
        </audio>

    </body>
</html>
