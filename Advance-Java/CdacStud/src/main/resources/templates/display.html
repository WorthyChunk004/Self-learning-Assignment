<!DOCTYPE html>
<html>
<head>
<title>Students</title>
</head>

<body>
<h2>Student List</h2>

<table border="1">

<tr>
	<th>ID</th>
	<th>NAME</th>
	<th>COURSE</th>
</tr>

<tr th:each="s : ${students}">
	<td th:text="${s.id}"></td>
	<td th:text="${s.name}"></td>
	<td th:text="${s.course}"></td>
	
	<td>
		<a th:href="@{/delete/{id}(id=${s.id})}">Delete</a>
	</td>
</tr>
</table>
</body>
</html>
